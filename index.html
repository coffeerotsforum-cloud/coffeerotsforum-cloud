<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>АХУЕННЫЙ БОТ | НАЖМИ СЮДА</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #0f0f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'Montserrat', 'Poppins', sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            cursor: pointer;
        }

        /* Эпичный динамический фон */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 80, 120, 0.2), transparent 60%),
                        radial-gradient(circle at 80% 70%, rgba(255, 200, 80, 0.25), transparent 70%);
            animation: breathe 6s infinite alternate;
            pointer-events: none;
        }

        @keyframes breathe {
            0% { opacity: 0.4; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.05);}
        }

        .container {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 550px;
        }

        /* ГЛАВНАЯ КАРТОЧКА */
        .card {
            background: rgba(10, 12, 28, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 70px;
            padding: 30px 24px 40px;
            text-align: center;
            border: 1px solid rgba(255, 100, 150, 0.5);
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 2px rgba(255, 100, 100, 0.2);
            transition: all 0.2s ease;
        }

        img {
            max-width: 180px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 8px #ff6b6b88);
        }

        /* АХУЕННЫЙ ЗАГОЛОВОК С АНИМАЦИЕЙ */
        .epic-title {
            font-size: 2.4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FF4D6D, #FFB347, #FF6A88, #FFD166);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 15px 0 10px;
            animation: gradientMove 3s ease infinite, glitch 1.5s infinite;
            letter-spacing: -1px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glitch {
            0%, 100% { text-shadow: -1px 0 #ff00aa, 1px 0 #00ffea; }
            33% { text-shadow: 1px 0 #ff00aa, -1px 0 #00ffea; }
            66% { text-shadow: 0px 0px 6px #ff0066; }
        }

        .badge {
            background: rgba(255, 80, 120, 0.25);
            backdrop-filter: blur(8px);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffb7c5;
            margin: 10px 0;
            border: 1px solid #ff6b6b;
            letter-spacing: 1px;
        }

        /* СУПЕР БОТ-КНОПКА */
        .bot-button {
            background: linear-gradient(95deg, #ff2b6e, #ff8c42, #ff2b6e);
            background-size: 200% auto;
            border: none;
            width: 100%;
            padding: 20px 15px;
            margin: 20px 0;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 0 #9b2f4e;
            font-family: monospace;
            letter-spacing: 2px;
            animation: buttonPulse 1.8s infinite;
        }

        .bot-button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #9b2f4e;
        }

        @keyframes buttonPulse {
            0% { background-position: 0% 50%; box-shadow: 0 8px 0 #9b2f4e; }
            50% { background-position: 100% 50%; box-shadow: 0 8px 0 #ff5e8e; }
            100% { background-position: 0% 50%; box-shadow: 0 8px 0 #9b2f4e; }
        }

        /* СЧЁТЧИК АХУЕННОСТИ */
        .counter-box {
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 12px 15px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid rgba(255,200,100,0.6);
        }

        .counter-label {
            font-size: 1rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ffcc88, #ffaa66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .counter-value {
            font-size: 2.5rem;
            font-weight: 900;
            font-family: monospace;
            background: linear-gradient(135deg, #ffcc88, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px #ff6b6b66;
        }

        /* АХУЕННАЯ ШКАЛА */
        .power-bar {
            background: #2a1e2e;
            border-radius: 30px;
            height: 18px;
            width: 100%;
            overflow: hidden;
            margin: 15px 0;
        }

        .power-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff3366, #ffcc33, #ff44aa);
            border-radius: 30px;
            transition: width 0.2s cubic-bezier(0.34, 1.2, 0.64, 1);
            box-shadow: 0 0 12px #ff6699;
        }

        .reaction-zone {
            margin: 20px 0 0;
            font-size: 2.5rem;
            letter-spacing: 8px;
            min-height: 80px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .tt-link-custom {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(95deg, #000, #ff0050);
            color: white;
            padding: 14px 30px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 20px;
            transition: all 0.2s;
            border: 1px solid #ff6699;
        }

        .tt-link-custom:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px #ff3366;
        }

        /* кнопка сброса - секретно */
        .reset-btn {
            background: none;
            border: none;
            color: #ff8888aa;
            font-size: 0.7rem;
            margin-top: 15px;
            cursor: pointer;
            text-decoration: underline;
            opacity: 0.5;
            transition: 0.2s;
        }

        .reset-btn:hover {
            opacity: 1;
            color: #ff8888;
        }

        .watch-link {
            display: inline-block;
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 15px 0 5px;
            transition: 0.2s;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <img src="https://i.ibb.co/jZqvhRFz/9004a5671e798573326ff985fa180a44.gif" alt="decor">

        <!-- Эпичный заголовок который кричит что это ахуенно -->
        <div class="epic-title">
            🤯 ЭТО АХУЕННО 🤯
        </div>
        <div class="badge">
            ⚡️ БОТ-РЕАКТОР | МОЩНОСТЬ 999% ⚡️
        </div>

        <!-- ССЫЛКА СМОТРЕТЬ (стилизовано) -->
        <a href="#" class="watch-link" id="watchLink">🎬 СМОТРЕТЬ ШЕДЕВР</a>

        <!-- ГЛАВНЫЙ БОТ: ТЫКАЙ СЮДА, ЧТОБЫ ПОЧУВСТВОВАТЬ ВЕСЬ АХУЕННОСТЬ -->
        <button class="bot-button" id="botButton">
            💥 ЖМИ СЮДА, ЭТО БОТ 💥
        </button>

        <!-- Счётчик "насколько ахуенно" -->
        <div class="counter-box">
            <span class="counter-label">🔥 УРОВЕНЬ АХУЕННОСТИ 🔥</span>
            <span class="counter-value" id="coolnessCounter">0</span>
        </div>

        <!-- Шкала мощности -->
        <div class="power-bar">
            <div class="power-fill" id="powerFill"></div>
        </div>

        <!-- Зона эмоциональных реакций -->
        <div class="reaction-zone" id="reactionZone">
            💀 🚀 🎉
        </div>

        <!-- ССЫЛКА НА ТИКТОК (сохранена оригинальная) -->
        <a href="https://www.tiktok.com/@.....2456coffee?_r=1&_t=ZS-9547Tg4oLlk" class="tt-link-custom" target="_blank">
            📱 MY TT | ПОДПИШИСЬ, ТАМ ЕЩЁ АХУЕННЕЕ
        </a>

        <!-- Секретная кнопка сброса (чтоб обнулить если че) -->
        <button class="reset-btn" id="resetBtn">🌀 сбросить всё нахер 🌀</button>
    </div>
</div>

<script>
    // =========== АХУЕННЫЙ БОТ-ЛОГИКА ===========
    let coolness = 0;          // базовый уровень
    let clickPower = 1;        // начальная мощь клика
    let combo = 0;
    let lastClickTime = 0;

    // DOM элементы
    const botBtn = document.getElementById('botButton');
    const coolnessSpan = document.getElementById('coolnessCounter');
    const powerFill = document.getElementById('powerFill');
    const reactionZone = document.getElementById('reactionZone');
    const resetBtn = document.getElementById('resetBtn');
    const watchLink = document.getElementById('watchLink');

    // Массив эпичных фраз и реакций
    const reactions = [
        "💥 АХУЕННО! 💥", "⚡️ ЕЩЁ! ⚡️", "🔥 НЕВЕРОЯТНО 🔥", "🤯 РАЗРЫВ 🤯", 
        "🎇 БОЖЕ, КАКОЙ КАЙФ 🎇", "🚀 ВЗЛЁТ ПОЛНЫЙ 🚀", "💎 АХУЕТЬ КАК КРУТО 💎",
        "🕹️ БОТ В ШОКЕ 🕹️", "🌈 ЭТО ПРОСТО КОСМОС 🌈", "🍆 НЕРЕАЛЬНО 🍆",
        "🔊 ГРОМКО И СОЧНО 🔊", "✨ АХУЕННЫЙ БУСТ ✨", "⭐️ МАКСИМУМ ⭐️",
        "🍾 ВАУ, ЭТО ПИЗДЕЦ КАК ХОРОШО 🍾", "🎯 ТОЧНО В ЦЕЛЬ 🎯"
    ];

    // функция обновления интерфейса (счётчик + шкала)
    function updateUI() {
        // отображаем значение
        coolnessSpan.innerText = Math.floor(coolness);
        
        // шкала мощности: макс 500 (но можно больше, шкала до 100% ограничена)
        let percent = Math.min(100, (coolness / 500) * 100);
        powerFill.style.width = percent + "%";
        
        // если процент > 90%, добавляем свечение на шкалу
        if(percent >= 90) {
            powerFill.style.boxShadow = "0 0 20px #ff44aa, 0 0 5px #ffaa33";
        } else {
            powerFill.style.boxShadow = "0 0 12px #ff6699";
        }

        // Меняем цвет заголовка в зависимости от ахуенности
        const epicTitle = document.querySelector('.epic-title');
        if(coolness >= 300) {
            epicTitle.style.animation = "gradientMove 3s ease infinite, glitch 1.5s infinite, textShake 0.3s infinite";
            document.querySelector('.badge').innerHTML = "💎 РЕЖИМ: АХУЕННОСТЬ БЕСКОНЕЧНА 💎";
        } else if(coolness >= 150) {
            epicTitle.style.animation = "gradientMove 3s ease infinite, glitch 1.5s infinite";
            document.querySelector('.badge').innerHTML = "⚡️ МЕГА-АХУЕННО! ЕЩЁ! ⚡️";
        } else if(coolness >= 50) {
            document.querySelector('.badge').innerHTML = "🔥 ОЧЕНЬ АХУЕННО, ПРОДОЛЖАЙ! 🔥";
        } else {
            document.querySelector('.badge').innerHTML = "🤖 НАЖМИ НА БОТА, БУДЕТ АХУЕННО 🤖";
        }
    }

    // функция показа случайной реакции (эмоциональный взрыв)
    function showRandomReaction(extraBoost = false) {
        const randomIndex = Math.floor(Math.random() * reactions.length);
        let reactionText = reactions[randomIndex];
        
        // если комбо мощное или буст — добавляем огонька
        if(extraBoost || combo > 5) {
            reactionText = "💢💢💢 " + reactionText + " 💢💢💢";
        }
        
        reactionZone.innerHTML = `<span style="font-size:2rem; display:inline-block; animation: bounce 0.2s ease;">${reactionText}</span>`;
        
        // анимация для эффекта
        setTimeout(() => {
            if(reactionZone.innerHTML.includes(reactionText)) {
                // через полсекунды вернуть дефолтную иконку, но оставляем прикольный набор
                reactionZone.innerHTML = "💀 🚀 🎉 ⚡️ 🍆";
            }
        }, 800);
    }

    // Добавляем стиль для анимации подскока в head
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `
        @keyframes bounce {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.4); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes textShake {
            0% { transform: translate(1px, -1px); }
            100% { transform: translate(-1px, 1px); }
        }
        .bot-button {
            transition: all 0.05s linear;
        }
        .power-fill {
            transition: width 0.1s cubic-bezier(0.2, 1.6, 0.4, 1);
        }
    `;
    document.head.appendChild(styleSheet);

    // функция для начисления ахуенности + комбо система
    function addCoolness() {
        const now = Date.now();
        // комбо: если нажали быстрее чем за 0.7 секунды, увеличиваем множитель
        if(now - lastClickTime < 700) {
            combo++;
            if(combo > 20) combo = 20; // ограничим
        } else {
            combo = 1;
        }
        lastClickTime = now;
        
        // базовая мощь клика + бонус за комбо
        let gain = clickPower + Math.floor(combo / 3);
        // рандомный вайб: иногда выпадает крит
        let isCritical = Math.random() < 0.25;
        if(isCritical) {
            gain = gain * 2 + 5;
            showRandomReaction(true);
            reactionZone.innerHTML = `<span style="font-size:2rem; animation: bounce 0.2s;">💥 КРИТИЧЕСКИ АХУЕННО! +${gain} 💥</span>`;
            setTimeout(() => {
                if(reactionZone.innerHTML.includes("КРИТИЧЕСКИ")) reactionZone.innerHTML = "💀 🚀 🎉 ⚡️ 🍆";
            }, 1000);
        } else {
            showRandomReaction(false);
        }
        
        coolness += gain;
        
        // дополнительный эффект: при достижении рубежей открываются новые возможности
        if(coolness >= 100 && coolness - gain < 100) {
            reactionZone.innerHTML = "🏆 ДОСТИЖЕНИЕ: 100 АХУЕННОСТИ! БОТ РАД 🏆";
            setTimeout(() => reactionZone.innerHTML = "💀 🚀 🎉 ⚡️ 🍆", 1500);
            clickPower += 1;
        }
        if(coolness >= 250 && coolness - gain < 250) {
            reactionZone.innerHTML = "🌟 МЕГА-РУБЕЖ! ТЫ РАЗНЕС ЭТОТ БОТ! +2 к силе клика 🌟";
            setTimeout(() => reactionZone.innerHTML = "💀 🚀 🎉 ⚡️ 🍆", 1700);
            clickPower += 2;
        }
        if(coolness >= 500 && coolness - gain < 500) {
            reactionZone.innerHTML = "👑 АБСОЛЮТНАЯ АХУЕННОСТЬ! ТЫ ЛЕГЕНДА! ВСЁ ВЗОРВАЛОСЬ 👑";
            setTimeout(() => reactionZone.innerHTML = "👑 💎 🚀 🍆 🔥", 2000);
            clickPower += 5;
        }
        
        // если coolness перевалил за 1000 — эпик мод
        if(coolness >= 1000) {
            document.querySelector('.epic-title').innerHTML = "🤯 БЕСКОНЕЧНАЯ АХУЕННОСТЬ 🤯";
            document.querySelector('.badge').innerHTML = "🌀 ТЫ ПОБЕДИЛ ВСЕЛЕННУЮ БОТА 🌀";
        }
        
        updateUI();
        
        // вибрация если есть поддержка (для мобил прикол)
        if(navigator.vibrate) {
            navigator.vibrate(50);
        }
        
        // анимация кнопки
        botBtn.style.transform = "scale(0.97)";
        setTimeout(() => { botBtn.style.transform = "scale(1)"; }, 80);
    }
    
    // сброс всей ахуенности
    function resetGame() {
        coolness = 0;
        clickPower = 1;
        combo = 0;
        lastClickTime = 0;
        updateUI();
        reactionZone.innerHTML = "🌀 ОБНУЛИЛИ, НО ЭТО ВСЁ РАВНО АХУЕННО 🌀";
        document.querySelector('.epic-title').innerHTML = "🤯 ЭТО АХУЕННО 🤯";
        document.querySelector('.badge').innerHTML = "🤖 НАЖМИ НА БОТА, БУДЕТ АХУЕННО 🤖";
        setTimeout(() => {
            if(reactionZone.innerHTML.includes("ОБНУЛИЛИ")) reactionZone.innerHTML = "💀 🚀 🎉 ⚡️ 🍆";
        }, 1800);
        // доп сброс заголовка
        const epicTitle = document.querySelector('.epic-title');
        epicTitle.style.animation = "gradientMove 3s ease infinite, glitch 1.5s infinite";
    }
    
    // обработчик для ссылки "СМОТРЕТЬ" с пасхалкой
    watchLink.addEventListener('click', (e) => {
        e.preventDefault();
        // добавляем ахуенный эффект + бонус
        coolness += 15;
        updateUI();
        reactionZone.innerHTML = "🎬 СМОТРЕТЬ ЭТО АХУЕННО! +15 К АХУЕННОСТИ 🎬";
        setTimeout(() => reactionZone.innerHTML = "💀 🚀 🎉 ⚡️ 🍆", 1200);
        showRandomReaction(true);
        if(navigator.vibrate) navigator.vibrate(100);
    });
    
    botBtn.addEventListener('click', () => {
        addCoolness();
    });
    
    resetBtn.addEventListener('click', () => {
        resetGame();
    });
    
    // добавим автоподсказку, что бот живой
    setTimeout(() => {
        reactionZone.innerHTML = "👇👇 ЖМИ НА БОТА 👇👇";
        setTimeout(() => {
            if(reactionZone.innerHTML.includes("👇👇 ЖМИ")) reactionZone.innerHTML = "💀 🚀 🎉 ⚡️ 🍆";
        }, 2000);
    }, 800);
    
    // инициализация UI
    updateUI();
    
    // Для усиления эффекта добавим конфетти при достижении 100, 250, 500 (доп)
    function checkAchievement(oldVal, newVal) {
        if(oldVal < 100 && newVal >= 100) {
            createConfetti();
        }
        if(oldVal < 250 && newVal >= 250) {
            createConfetti();
        }
        if(oldVal < 500 && newVal >= 500) {
            createConfetti();
        }
        if(oldVal < 1000 && newVal >= 1000) {
            createConfetti();
        }
    }
    
    // простая имитация конфетти
    function createConfetti() {
        for(let i = 0; i < 40; i++) {
            const conf = document.createElement('div');
            conf.innerHTML = ['🔥','💎','⭐️','🎉','🚀','💥','🍆','✨'][Math.floor(Math.random()*8)];
            conf.style.position = 'fixed';
            conf.style.left = Math.random() * window.innerWidth + 'px';
            conf.style.top = '-30px';
            conf.style.fontSize = (20 + Math.random() * 25) + 'px';
            conf.style.pointerEvents = 'none';
            conf.style.zIndex = '9999';
            conf.style.opacity = '0.9';
            conf.style.transition = 'all 1.2s ease-out';
            document.body.appendChild(conf);
            const fall = Math.random() * 500 + 300;
            const horiz = (Math.random() - 0.5) * 200;
            setTimeout(() => {
                conf.style.transform = `translate(${horiz}px, ${window.innerHeight + 50}px) rotate(${Math.random() * 360}deg)`;
                conf.style.opacity = '0';
            }, 10);
            setTimeout(() => conf.remove(), 1300);
        }
    }
    
    // патчим addCoolness чтобы вызывать проверку ачивок
    const originalAdd = addCoolness;
    window.addCoolness = addCoolness;
    // переопределяем addCoolness с трекингом ачивок
    let lastCoolness = 0;
    function patchedAdd() {
        const old = coolness;
        originalAdd();
        checkAchievement(old, coolness);
    }
    window.addCoolness = patchedAdd;
    botBtn.onclick = () =
