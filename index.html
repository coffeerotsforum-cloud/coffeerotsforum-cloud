<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой первый сайт</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, sans-serif;
            padding: 20px;
        }
        .card {
            max-width: 500px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }
        img {
            max-width: 200px;
            border-radius: 20px;
        }
        a {
            display: inline-block;
            text-decoration: none;
            font-size: 28px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 20px 0;
        }
        .tt-btn {
            background: linear-gradient(45deg, #000, #ff0050);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://i.ibb.co/jZqvhRFz/9004a5671e798573326ff985fa180a44.gif" alt="decor">
        <br>
        <a href="#">🎬 СМОТРЕТЬ</a>
        <br>
        <a href="https://www.tiktok.com/@.....2456coffee?_r=1&_t=ZS-9547Tg4oLlk" class="tt-btn">📱 MY TT</a>
    </div>
</body>
</html>
